name: Release

# Tag-triggered signed + notarized release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   MACOS_CERT_P12_BASE64  – Developer ID Application .p12, base64-encoded
#                            (`base64 -i cert.p12 | pbcopy`)
#   MACOS_CERT_PASSWORD    – password for that .p12
#   APPLE_ID               – Apple ID email used for notarization
#   APPLE_PASSWORD         – app-specific password (appleid.apple.com)
#   APPLE_TEAM_ID          – 10-char team id (e.g. ABCDE12345)
#
# Push a tag to trigger:  git tag v1.1 && git push origin v1.1

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Sign, notarize & publish
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Import Developer ID certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/cert.p12"
          echo "Imported signing identities:"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build, sign, notarize & staple DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ github.ref_name }}
        run: |
          # dmg.sh auto-detects the Developer ID identity and reads the
          # notarization creds from the environment above.
          ./dmg.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/FastCleanup-*.dmg
          generate_release_notes: true
